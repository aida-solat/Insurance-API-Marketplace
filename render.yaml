services:
  - type: web
    name: aegis-backend
    runtime: docker
    rootDir: back
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: auto
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./data.db
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
